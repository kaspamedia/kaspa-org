version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 24
        - nvm use 24
        - node -v
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - env | grep -E '^(KASPA_NEWS_ASK_API_KEY|KASPA_NEWS_ASK_API_URL)=' >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
